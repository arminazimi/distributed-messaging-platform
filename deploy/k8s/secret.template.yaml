apiVersion: v1
kind: Secret
metadata:
  name: messaging-platform-secret
  namespace: distributed-messaging-platform
  labels:
    app.kubernetes.io/name: distributed-messaging-platform
type: Opaque
stringData:
  # Local development defaults. Replace these before applying to a shared cluster.
  DB_PASSWORD: message_pass
  MYSQL_ROOT_PASSWORD: root_pass
  RABBITMQ_DEFAULT_PASS: rabbit_pass
  RABBIT_URI: amqp://rabbit_user:rabbit_pass@rabbitmq:5672/

