services:
  mysql:
    image: mysql:8.4
    container_name: messaging_platform_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: messaging_platform
      MYSQL_USER: message_user
      MYSQL_PASSWORD: message_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: messaging_platform_rabbitmq
    restart: unless-stopped
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_prometheus && rabbitmq-server"
    environment:
      RABBITMQ_DEFAULT_USER: rabbit_user
      RABBITMQ_DEFAULT_PASS: rabbit_pass
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    image: gateway:latest
    container_name: messaging_platform_app
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      LISTEN_ADDR: ":8080"
      DB_USER_NAME: message_user
      DB_PASSWORD: message_pass
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: messaging_platform
      RABBIT_URI: amqp://rabbit_user:rabbit_pass@rabbitmq:5672/
      RABBIT_MESSAGE_EXCHANGE: message_exchange
      EXPRESS_QUEUE: message_express
      NORMAL_QUEUE: message_normal
      OTEL_EXPORTER_OTLP_ENDPOINT: localhost:4317
      OTEL_EXPORTER_OTLP_INSECURE: true
      GLOBAL_RATE_LIMIT_RPS: 1000
      GLOBAL_RATE_LIMIT_BURST: 1000
      USER_RATE_LIMIT_RPS: 20
      USER_RATE_LIMIT_BURST: 20
      BACKPRESSURE_ENABLED: true
      BACKPRESSURE_OUTBOX_PENDING_THRESHOLD: 10000
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: messaging_platform_prometheus
    depends_on:
      app:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.4.0
    container_name: messaging_platform_grafana
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  mysql_data:
  rabbitmq_data:
  grafana_data:
